<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>

    <!-- CSS -->
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        header {
            background: #333;
            color: white;
            padding: 15px;
        }

        main {
            padding: 20px;
        }

        footer {
            background: #f1f1f1;
            padding: 10px;
            position: fixed;
            width: 100%;
            bottom: 0;
        }
    </style>
</head>
<body>

    <header>
        <h1>Welcome to My Website</h1>
    </header>

    <main>
        <h2>Hello 👋</h2>
        <p>This is my index.html file.</p>

        <button onclick="showMessage()">Click Me</button>
    </main>

    <footer>
        <p>&copy; 2026 My Website</p>
    </footer>

    <!-- JavaScript -->
    <script>
        function showMessage() {
            alert("Button clicked!");
        }
    </script>

</body>
</html>
